# CART SERVICE
spring.cloud.gateway.routes[0].id=cart-service
spring.cloud.gateway.routes[0].uri=lb://CART
spring.cloud.gateway.routes[0].predicates[0]=Path=/carts/**

# PRODUCT CATALOG
spring.cloud.gateway.routes[1].id=productcatalog-service
spring.cloud.gateway.routes[1].uri=lb://PRODUCTCATALOG
spring.cloud.gateway.routes[1].predicates[0]=Path=/catalogs/products/**

# PRICING
spring.cloud.gateway.routes[2].id=pricing-service
spring.cloud.gateway.routes[2].uri=lb://PRICING
spring.cloud.gateway.routes[2].predicates[0]=Path=/pricing/**

# STOCK
spring.cloud.gateway.routes[3].id=stock-service
spring.cloud.gateway.routes[3].uri=lb://STOCK
spring.cloud.gateway.routes[3].predicates[0]=Path=/stock/**

# PRODUCT SERVICE (NEW)
spring.cloud.gateway.routes[4].id=product-service
spring.cloud.gateway.routes[4].uri=lb://PRODUCT
spring.cloud.gateway.routes[4].predicates[0]=Path=/product/**

# RECOMMENDATION SERVICE (NEW)
spring.cloud.gateway.routes[5].id=recommendation-service
spring.cloud.gateway.routes[5].uri=lb://RECOMMENDATION
spring.cloud.gateway.routes[5].predicates[0]=Path=/recommendations/**

# Using Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Zipkins
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans